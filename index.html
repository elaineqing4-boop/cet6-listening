function renderWords(){

  const container=
document.getElementById("container");

container.innerHTML="";

let currentCategory="";

words.forEach(item=>{

if(item.category!==currentCategory){

currentCategory=item.category;

container.innerHTML+=`
<div class="category">
<h2>${currentCategory}</h2>
</div>
`;
}

container.innerHTML+=`

<div class="word">

<h3>${item.word}</h3>

<button
class="speak"
onclick="speak('${item.word}')">
🔊 单词
</button>

<button
class="show"
onclick="toggle(this)">
显示内容
</button>

<div class="info hidden">

<p><b>中文：</b>${item.meaning}</p>

<p><b>搭配：</b>${item.phrase}</p>

<p><b>例句：</b>${item.example}</p>

<button
class="speak"
onclick="speak('${item.example}')">
🔊 例句
</button>

</div>

</div>

`;

});

}

function favorite(word){

if(!favorites.includes(word)){
favorites.push(word);
}

alert(
"已收藏：\n\n"+
favorites.join("\n")
);

}

function toggle(btn){

const info=
btn.parentElement.querySelector(".info");

info.classList.toggle("hidden");
}

function speak(text){

const utterance=
new SpeechSynthesisUtterance(text);

utterance.lang="en-US";

speechSynthesis.speak(utterance);
}

function searchWord(){

let keyword=
document.getElementById("search")
.value.toLowerCase();

let cards=
document.querySelectorAll(".word");

cards.forEach(card=>{

let text=
card.innerText.toLowerCase();

if(text.includes(keyword)){
card.style.display="";
}else{
card.style.display="none";
}

});
}
renderWords();

);

}
